<!DOCTYPE html>
<html>
<head>
    <title>Dark Notes App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🌙 Dark Notes App</h1>

    <form action="/add" method="post">
        <input type="text" name="title" placeholder="Note Title" required>
        <textarea name="content" placeholder="Write your note..." required></textarea>
        <button type="submit">Add Note</button>
    </form>

    <div class="notes">
        {% for note in notes %}
        <div class="note">
            <h3>{{ note.title }}</h3>
            <p>{{ note.content }}</p>
            <a href="/delete/{{ note.id }}">Delete</a>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
